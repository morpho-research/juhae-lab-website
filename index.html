<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Juhae Lee</title>
<style>
@font-face {
  font-family: 'Effra';
  src: url('fonts/Effra_He.ttf') format('truetype');
  font-weight: 900;
}
@font-face {
  font-family: 'Effra';
  src: url('fonts/Effra_Md.ttf') format('truetype');
  font-weight: 500;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Effra', -apple-system, sans-serif;
  background: #000;
  color: #fff;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* Lock screen */
.lock-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.lock-screen.swiped {
  transform: translateY(-100%);
}

.name {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 10px;
  text-transform: uppercase;
  margin-bottom: 16px;
  text-indent: 10px;
}

.lab {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  text-indent: 5px;
}

.footer {
  position: absolute;
  bottom: 30px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
  text-indent: 2px;
  text-align: center;
}

.enter-btn {
  margin-top: 36px;
  padding: 0;
  width: auto;
  min-width: 0;
  height: 44px;
  padding-left: 20px;
  padding-right: 17px;
  border-radius: 22px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(50px) saturate(200%);
  -webkit-backdrop-filter: blur(50px) saturate(200%);
  color: rgba(255,255,255,0.85);
  font-family: 'Effra', -apple-system, sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 3px;
  text-indent: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.1s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  border-top-color: rgba(255,255,255,0.2);
}

.enter-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -50%; right: -50%;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 100%);
  border-radius: 22px 22px 0 0;
  pointer-events: none;
}

.enter-btn .ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transform: scale(0);
  animation: ripple 0.4s ease-out forwards;
  pointer-events: none;
}

@keyframes ripple {
  to { transform: scale(3); opacity: 0; }
}

.enter-btn:active {
  transform: scale(0.95);
}

/* Passcode screen */
.passcode-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 5;
  background: #000;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease;
}

.passcode-screen.active {
  opacity: 1;
  visibility: visible;
}

.passcode-label {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.85);
  margin-bottom: 24px;
}

.dots {
  display: flex;
  gap: 20px;
  margin-bottom: 48px;
}

.dot {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.35);
  background: transparent;
  transition: all 0.15s;
}

.dot.filled {
  background: #fff;
  border-color: #fff;
}

.dot.error {
  background: #ff453a;
  border-color: #ff453a;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 85px);
  gap: 16px;
}

.num-btn {
  width: 85px;
  height: 85px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(50px) saturate(200%);
  -webkit-backdrop-filter: blur(50px) saturate(200%);
  color: #fff;
  font-family: -apple-system, 'SF Pro Display', 'Effra', sans-serif;
  font-size: 32px;
  font-weight: 300;
  border: 1px solid rgba(255,255,255,0.08);
  border-top-color: rgba(255,255,255,0.15);
  cursor: pointer;
  transition: background 0.08s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

.num-btn .sub {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.5);
  margin-top: 1px;
}

.num-btn:active, .num-btn.pressed {
  background: rgba(255,255,255,0.35);
}

.num-btn.empty {
  background: transparent;
  cursor: default;
}

.num-btn.empty:active {
  background: transparent;
}

.num-btn.delete {
  background: transparent;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
}

.num-btn.delete:active {
  background: transparent;
  color: #fff;
}

.passcode-footer {
  position: absolute;
  bottom: 30px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
}
/* Desktop - match phone feel */
@media (min-width: 768px) {
  .lock-screen, .passcode-screen {
    max-width: 420px;
    margin: 0 auto;
    left: 50%;
    transform: translateX(-50%);
  }
  .lock-screen.swiped {
    transform: translateX(-50%) translateY(-100%);
  }
}

/* Small phones */
@media (max-width: 380px) {
  .name { font-size: 22px; letter-spacing: 7px; text-indent: 7px; }
  .lab { font-size: 11px; letter-spacing: 4px; text-indent: 4px; margin-bottom: 40px; }
  .enter-btn { height: 40px; font-size: 11px; }
  .numpad { grid-template-columns: repeat(3, 72px); gap: 10px; }
  .num-btn { width: 72px; height: 72px; font-size: 28px; }
  .num-btn .sub { font-size: 8px; }
}
</style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen">
  <div class="name">JU HAE LEE</div>
  <div class="lab">Morpho Lab</div>
  <button class="enter-btn" onclick="showPasscode()">ENTER</button>
  <div class="footer">2026</div>
</div>

<!-- Passcode Screen -->
<div class="passcode-screen" id="passcodeScreen">
  <div class="passcode-label">Enter Passcode</div>
  <div class="dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button class="num-btn" data-num="1">1</button>
    <button class="num-btn" data-num="2">2</button>
    <button class="num-btn" data-num="3">3</button>
    <button class="num-btn" data-num="4">4</button>
    <button class="num-btn" data-num="5">5</button>
    <button class="num-btn" data-num="6">6</button>
    <button class="num-btn" data-num="7">7</button>
    <button class="num-btn" data-num="8">8</button>
    <button class="num-btn" data-num="9">9</button>
    <button class="num-btn empty"></button>
    <button class="num-btn" data-num="0">0</button>
    <button class="num-btn delete" data-action="del">Delete</button>
  </div>
  <div class="passcode-footer">2026</div>
</div>

<script>
const HASH = '0ffe1abd1a08215353c233d6e009613e95eec4253832a761af28ff37ac5a150c';
let code = '';
let startY = 0;

const lock = document.getElementById('lockScreen');

function showPasscode() {
  lock.classList.add('swiped');
  document.getElementById('passcodeScreen').classList.add('active');
}

// Numpad touch highlight
document.querySelectorAll('.num-btn').forEach(function(btn) {
  function highlight() { btn.classList.add('pressed'); }
  function unhighlight() { btn.classList.remove('pressed'); }

  btn.addEventListener('touchstart', function(e) {
    highlight();
    var num = btn.getAttribute('data-num');
    var action = btn.getAttribute('data-action');
    if (num !== null) press(parseInt(num));
    if (action === 'del') del();
  }, { passive: true });

  btn.addEventListener('touchend', function() {
    setTimeout(unhighlight, 120);
  });

  btn.addEventListener('mousedown', function() {
    highlight();
    var num = btn.getAttribute('data-num');
    var action = btn.getAttribute('data-action');
    if (num !== null) press(parseInt(num));
    if (action === 'del') del();
  });

  btn.addEventListener('mouseup', function() {
    setTimeout(unhighlight, 120);
  });

  btn.addEventListener('mouseleave', unhighlight);
});

// Ripple effect on button
document.querySelector('.enter-btn').addEventListener('click', function(e) {
  const btn = this;
  const rect = btn.getBoundingClientRect();
  const x = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left;
  const y = (e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height/2) - rect.top;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  ripple.style.width = ripple.style.height = '40px';
  ripple.style.marginLeft = '-20px';
  ripple.style.marginTop = '-20px';
  btn.appendChild(ripple);
  setTimeout(function() { ripple.remove(); }, 400);
});

// Numpad
function press(n) {
  if (code.length >= 4) return;
  code += n;
  updateDots();
  if (code.length === 4) {
    setTimeout(checkCode, 200);
  }
}

function del() {
  code = code.slice(0, -1);
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.className = 'dot' + (i < code.length ? ' filled' : '');
  }
}

async function checkCode() {
  const encoded = new TextEncoder().encode(code);
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

  if (hashHex === HASH) {
    window.location.href = '/dashboard/';
  } else {
    const dots = document.querySelectorAll('.dot');
    dots.forEach(d => d.className = 'dot error');
    setTimeout(function() {
      code = '';
      updateDots();
    }, 500);
  }
}

// Keyboard support
document.addEventListener('keydown', function(e) {
  if (lock.classList.contains('swiped')) {
    if (e.key >= '0' && e.key <= '9') press(parseInt(e.key));
    if (e.key === 'Backspace') del();
  } else {
    if (e.key === 'Enter' || e.key === ' ') showPasscode();
  }
});
</script>

</body>
</html>
