<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Juhae Lee</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
@font-face {
  font-family: 'Effra';
  src: url('fonts/Effra_He.ttf') format('truetype');
  font-weight: 900;
}
@font-face {
  font-family: 'Effra';
  src: url('fonts/Effra_Md.ttf') format('truetype');
  font-weight: 500;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { touch-action: manipulation; }

body {
  font-family: 'Effra', -apple-system, sans-serif;
  background: #000;
  color: #fff;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* Lock screen */
.lock-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.lock-screen.swiped {
  transform: translateY(-100%);
}

.name {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 10px;
  text-transform: uppercase;
  margin-bottom: 12px;
  text-indent: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lab {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  text-indent: 5px;
  margin-bottom: 16px;
}

.footer {
  position: absolute;
  bottom: 30px;
  font-size: 11px;
  font-weight: 500;
  color: #fff;
  letter-spacing: 2px;
  text-indent: 2px;
  text-align: center;
}

.live-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4ade80;
  margin-right: 10px;
  flex-shrink: 0;
  animation: livepulse 2s infinite;
  display: none;
}

.live-status.active {
  display: block;
}

@keyframes livepulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

@keyframes urgentpulse {
  0%, 100% { opacity: 1; }
  25% { opacity: 0.1; }
  50% { opacity: 1; }
  75% { opacity: 0.1; }
}

.picky-btn {
  margin-top: 16px !important;
}

.student-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.97);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.student-overlay.active {
  display: flex;
}

.student-label {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 20px;
  text-align: center;
  width: 100%;
}

.student-input {
  background: rgba(255,255,255,0.08);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'Effra', -apple-system, sans-serif;
  font-size: 18px;
  font-weight: 500;
  padding: 16px 20px;
  width: 100%;
  max-width: 280px;
  text-align: center;
  letter-spacing: 4px;
  outline: none;
}

.student-input:focus {
  background: rgba(255,255,255,0.12);
}

.student-input::placeholder {
  color: rgba(255,255,255,0.15);
  letter-spacing: 2px;
  font-size: 13px;
}

.student-go {
  margin-top: 20px;
  padding: 0;
  width: 100%;
  max-width: 280px;
  height: 44px;
  padding-left: 24px;
  padding-right: 21px;
  border-radius: 22px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(50px) saturate(200%);
  -webkit-backdrop-filter: blur(50px) saturate(200%);
  color: rgba(255,255,255,0.85);
  font-family: 'Effra', -apple-system, sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 3px;
  text-indent: 3px;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  transition: transform 0.1s;
}

.student-go:active {
  transform: scale(0.95);
}

.student-close {
  position: absolute;
  top: 20px;
  right: 24px;
  color: rgba(255,255,255,0.3);
  font-size: 28px;
  cursor: pointer;
  background: none;
  border: none;
  width: 44px;
  height: 44px;
}

.enter-btn {
  margin-top: 0;
  padding: 0;
  width: auto;
  min-width: 0;
  height: 44px;
  padding-left: 20px;
  padding-right: 17px;
  border-radius: 22px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(50px) saturate(200%);
  -webkit-backdrop-filter: blur(50px) saturate(200%);
  color: rgba(255,255,255,0.85);
  font-family: 'Effra', -apple-system, sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 3px;
  text-indent: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.1s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  border-top-color: rgba(255,255,255,0.2);
}

.enter-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -50%; right: -50%;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 100%);
  border-radius: 22px 22px 0 0;
  pointer-events: none;
}

.enter-btn .ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transform: scale(0);
  animation: ripple 0.4s ease-out forwards;
  pointer-events: none;
}

@keyframes ripple {
  to { transform: scale(3); opacity: 0; }
}

.enter-btn:active {
  transform: scale(0.95);
}

/* Passcode screen */
.passcode-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 5;
  background: #000;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease;
}

.passcode-screen.active {
  opacity: 1;
  visibility: visible;
}

.passcode-label {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.85);
  margin-bottom: 24px;
}

.dots {
  display: flex;
  gap: 20px;
  margin-bottom: 48px;
}

.dot {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.35);
  background: transparent;
  transition: all 0.15s;
}

.dot.filled {
  background: #fff;
  border-color: #fff;
}

.dot.error {
  background: #ff453a;
  border-color: #ff453a;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 85px);
  gap: 16px;
}

.num-btn {
  width: 85px;
  height: 85px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: #fff;
  font-family: -apple-system, 'SF Pro Display', 'Effra', sans-serif;
  font-size: 32px;
  font-weight: 400;
  border: 1px solid rgba(255,255,255,0.15);
  border-top-color: rgba(255,255,255,0.3);
  border-bottom-color: rgba(255,255,255,0.08);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  cursor: pointer;
  transition: background 0.08s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

.num-btn .sub {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.5);
  margin-top: 1px;
}

.num-btn:active, .num-btn.pressed {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.4);
}

.num-btn.empty {
  background: transparent;
  border: none;
  cursor: default;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

.num-btn.empty:active {
  background: transparent;
}

.num-btn.delete {
  background: transparent;
  border: none;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

.num-btn.delete:active {
  background: transparent;
  color: #fff;
}

.passcode-footer {
  position: absolute;
  bottom: 30px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
}
/* All screens: lock to phone proportions */
.lock-screen, .passcode-screen {
  max-width: 420px;
  margin: 0 auto;
  left: 0; right: 0;
}

/* Desktop: fix dot alignment */
@media (min-width: 768px) {
  .live-status { position: relative; top: -2px; }
}

/* Small phones */
@media (max-width: 380px) {
  .name { font-size: 22px; letter-spacing: 7px; text-indent: 7px; }
  .lab { font-size: 11px; letter-spacing: 4px; text-indent: 4px; }
  .numpad { grid-template-columns: repeat(3, 72px); gap: 10px; }
  .num-btn { width: 72px; height: 72px; font-size: 28px; }
}
</style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen">
  <div class="name"><span class="live-status" id="liveStatus"></span>JU HAE LEE</div>
  <div class="lab">Morpho Lab</div>
  <button class="enter-btn" onclick="showPasscode()">ENTER</button>
  <button class="enter-btn picky-btn" onclick="showPickyPasscode()">PICKY</button>
  <div class="footer">2026</div>
</div>

<!-- Passcode Screen -->
<div class="passcode-screen" id="passcodeScreen">
  <div class="passcode-label">Enter Passcode</div>
  <div class="dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button class="num-btn" data-num="1">1</button>
    <button class="num-btn" data-num="2">2</button>
    <button class="num-btn" data-num="3">3</button>
    <button class="num-btn" data-num="4">4</button>
    <button class="num-btn" data-num="5">5</button>
    <button class="num-btn" data-num="6">6</button>
    <button class="num-btn" data-num="7">7</button>
    <button class="num-btn" data-num="8">8</button>
    <button class="num-btn" data-num="9">9</button>
    <button class="num-btn delete" data-action="cancel">Cancel</button>
    <button class="num-btn" data-num="0">0</button>
    <button class="num-btn delete" data-action="del">Delete</button>
  </div>
  <div class="passcode-footer">2026</div>
</div>

<!-- Student Login/Register Screen -->
<div class="student-overlay" id="studentOverlay">
  <button class="student-close" onclick="closeStudent()">&times;</button>

  <!-- Tab Toggle -->
  <div style="display:flex;gap:0;margin-bottom:24px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);">
    <button id="tabRegister" style="flex:1;padding:10px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);border:none;font-family:'Effra',sans-serif;letter-spacing:2px;" onclick="showTab('register')">NEW</button>
    <button id="tabLogin" style="flex:1;padding:10px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,0.35);border:none;font-family:'Effra',sans-serif;letter-spacing:2px;" onclick="showTab('login')">LOGIN</button>
  </div>

  <!-- Register Form -->
  <div id="registerForm" style="display:flex;flex-direction:column;align-items:center;width:100%;">
    <div class="student-label">New Student</div>
    <input class="student-input" id="studentId" type="text" placeholder="Student ID" maxlength="20" inputmode="numeric">
    <div style="height:12px"></div>
    <input class="student-input" id="studentName" type="text" placeholder="Name (English)">
    <div style="height:12px"></div>
    <input class="student-input" id="studentPin" type="password" placeholder="4-digit PIN" maxlength="4" inputmode="numeric" pattern="[0-9]{4}">
    <div style="height:4px"></div>
    <div style="font-size:11px;color:rgba(255,255,255,0.25);text-align:center;">Remember your PIN to come back later</div>
    <button class="student-go" onclick="doRegister()">START</button>
  </div>

  <!-- Login Form -->
  <div id="loginForm" style="display:none;flex-direction:column;align-items:center;width:100%;">
    <div class="student-label">Welcome Back</div>
    <input class="student-input" id="loginId" type="text" placeholder="Student ID" maxlength="20" inputmode="numeric">
    <div style="height:12px"></div>
    <input class="student-input" id="loginPin" type="password" placeholder="4-digit PIN" maxlength="4" inputmode="numeric" pattern="[0-9]{4}">
    <button class="student-go" onclick="doLogin()">LOGIN</button>
  </div>

  <div id="studentError" style="color:#ff453a;font-size:12px;margin-top:12px;text-align:center;display:none;"></div>
</div>

<script>
// Status dot - always show (deployment itself proves system is alive)
document.getElementById('liveStatus').classList.add('active');

const HASH_ENTER = '03aaef0fd45d47ee37afee60b41f0a80010f58f95d3d34e9b7dc253c8558bf2a';
const HASH_PICKY = '393a1a94b0e3a733d344c17fae097446b29e9d325f89fae0887021d5fe6c5792';
let code = '';
let startY = 0;
let inputLocked = false;
let pickyMode = false;

function haptic() {
  if (navigator.vibrate) navigator.vibrate(10);
}

const lock = document.getElementById('lockScreen');

function showPasscode() {
  pickyMode = false;
  lock.classList.add('swiped');
  document.getElementById('passcodeScreen').classList.add('active');
}

function showPickyPasscode() {
  pickyMode = true;
  lock.classList.add('swiped');
  document.getElementById('passcodeScreen').classList.add('active');
}

function showStudentId() {
  document.getElementById('studentOverlay').classList.add('active');
  document.getElementById('studentId').focus();
}

function closeStudent() {
  document.getElementById('studentOverlay').classList.remove('active');
}

var API = 'https://api.usepicky.live';

function showTab(tab) {
  document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('loginForm').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('tabRegister').style.background = tab === 'register' ? 'rgba(255,255,255,0.12)' : 'transparent';
  document.getElementById('tabRegister').style.color = tab === 'register' ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.35)';
  document.getElementById('tabLogin').style.background = tab === 'login' ? 'rgba(255,255,255,0.12)' : 'transparent';
  document.getElementById('tabLogin').style.color = tab === 'login' ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.35)';
  document.getElementById('studentError').style.display = 'none';
}

function showError(msg) {
  var el = document.getElementById('studentError');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doRegister() {
  var sid = document.getElementById('studentId').value.trim();
  var sname = document.getElementById('studentName').value.trim();
  var pin = document.getElementById('studentPin').value.trim();
  if (!sid) { document.getElementById('studentId').style.border = '1px solid #ff453a'; return; }
  if (!sname) { document.getElementById('studentName').style.border = '1px solid #ff453a'; return; }
  if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) { document.getElementById('studentPin').style.border = '1px solid #ff453a'; showError('PIN must be 4 digits'); return; }
  try {
    var res = await fetch(API + '/api/student/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student_id: sid, name: sname, pin: pin })
    });
    var data = await res.json();
    if (data.ok) {
      window.location.href = API + '/survey/pre?group=experimental&pid=' + encodeURIComponent(sid) + '&name=' + encodeURIComponent(sname) + '&session_id=' + data.session_id;
    } else {
      showError(data.error || 'Registration failed');
    }
  } catch(e) { showError('Connection error'); }
}

async function doLogin() {
  var sid = document.getElementById('loginId').value.trim();
  var pin = document.getElementById('loginPin').value.trim();
  if (!sid) { document.getElementById('loginId').style.border = '1px solid #ff453a'; return; }
  if (!pin || pin.length !== 4) { document.getElementById('loginPin').style.border = '1px solid #ff453a'; showError('PIN must be 4 digits'); return; }
  try {
    var res = await fetch(API + '/api/student/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student_id: sid, pin: pin })
    });
    var data = await res.json();
    if (data.ok) {
      // Check if session is converged → go to results, else continue picking
      try {
        var statsRes = await fetch(API + '/api/continuous/stats?session_id=' + data.session_id);
        var stats = await statsRes.json();
        if (stats.converged) {
          window.location.href = API + '/results?session=' + data.session_id;
        } else {
          window.location.href = API + '/?session_id=' + data.session_id + '&name=' + encodeURIComponent(data.name);
        }
      } catch(e2) {
        window.location.href = API + '/?session_id=' + data.session_id + '&name=' + encodeURIComponent(data.name);
      }
    } else {
      showError(data.error || 'Login failed');
    }
  } catch(e) { showError('Connection error'); }
}

// Numpad touch highlight
document.querySelectorAll('.num-btn').forEach(function(btn) {
  function highlight() { btn.classList.add('pressed'); }
  function unhighlight() { btn.classList.remove('pressed'); }

  btn.addEventListener('touchstart', function(e) {
    if (inputLocked) return;
    inputLocked = true;
    highlight();
    haptic();
    var num = btn.getAttribute('data-num');
    var action = btn.getAttribute('data-action');
    if (num !== null) press(parseInt(num));
    if (action === 'del') del();
    if (action === 'cancel') { code = ''; updateDots(); document.getElementById('passcodeScreen').classList.remove('active'); document.getElementById('lockScreen').classList.remove('swiped'); }
  }, { passive: true });

  btn.addEventListener('touchend', function() {
    setTimeout(function() { unhighlight(); inputLocked = false; }, 150);
  });

  btn.addEventListener('mousedown', function() {
    if (inputLocked) return;
    inputLocked = true;
    highlight();
    var num = btn.getAttribute('data-num');
    var action = btn.getAttribute('data-action');
    if (num !== null) press(parseInt(num));
    if (action === 'del') del();
    if (action === 'cancel') { code = ''; updateDots(); document.getElementById('passcodeScreen').classList.remove('active'); document.getElementById('lockScreen').classList.remove('swiped'); }
  });

  btn.addEventListener('mouseup', function() {
    setTimeout(function() { unhighlight(); inputLocked = false; }, 150);
  });

  btn.addEventListener('mouseleave', unhighlight);
});

// Ripple effect on button
document.querySelector('.enter-btn').addEventListener('click', function(e) {
  const btn = this;
  const rect = btn.getBoundingClientRect();
  const x = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left;
  const y = (e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height/2) - rect.top;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  ripple.style.width = ripple.style.height = '40px';
  ripple.style.marginLeft = '-20px';
  ripple.style.marginTop = '-20px';
  btn.appendChild(ripple);
  setTimeout(function() { ripple.remove(); }, 400);
});

// Numpad
function press(n) {
  if (code.length >= 4) return;
  code += n;
  updateDots();
  if (code.length === 4) {
    setTimeout(checkCode, 200);
  }
}

function del() {
  code = code.slice(0, -1);
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.className = 'dot' + (i < code.length ? ' filled' : '');
  }
}

async function checkCode() {
  const encoded = new TextEncoder().encode(code);
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

  if (!pickyMode && hashHex === HASH_ENTER) {
    window.location.href = '/dashboard/';
  } else if (pickyMode && hashHex === HASH_PICKY) {
    document.getElementById('passcodeScreen').classList.remove('active');
    showStudentId();
  } else {
    const dots = document.querySelectorAll('.dot');
    dots.forEach(d => d.className = 'dot error');
    setTimeout(function() {
      code = '';
      updateDots();
    }, 500);
  }
}

// Keyboard support
document.addEventListener('keydown', function(e) {
  if (lock.classList.contains('swiped')) {
    if (e.key >= '0' && e.key <= '9') press(parseInt(e.key));
    if (e.key === 'Backspace') del();
  } else {
    if (e.key === 'Enter' || e.key === ' ') showPasscode();
  }
});
</script>

</body>
</html>
