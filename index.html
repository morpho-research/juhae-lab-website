<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Juhae Lee</title>
<style>
@font-face {
  font-family: 'Effra';
  src: url('fonts/Effra_He.ttf') format('truetype');
  font-weight: 900;
  font-style: normal;
}
@font-face {
  font-family: 'Effra';
  src: url('fonts/Effra_Md.ttf') format('truetype');
  font-weight: 500;
  font-style: normal;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Effra', -apple-system, 'SF Pro Display', sans-serif;
  background: #000;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

.name {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 10px;
  text-transform: uppercase;
  margin-bottom: 6px;
  text-align: center;
}

.lab {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 50px;
  text-align: center;
}

.dash-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 200px;
  height: 50px;
  border: none;
  border-radius: 25px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  color: rgba(255,255,255,0.5);
  font-family: 'Effra', -apple-system, sans-serif;
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 3px;
  text-indent: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.4), inset 0 -1px 1px rgba(255,255,255,0.04);
}

.dash-btn:active {
  transform: scale(0.97);
  background: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.8);
}

/* Password modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.97);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  text-align: center;
  width: 100%;
  padding: 0 40px;
}

.modal-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-bottom: 20px;
}

.modal input {
  background: rgba(255,255,255,0.08);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'Effra', -apple-system, sans-serif;
  font-size: 18px;
  font-weight: 500;
  padding: 16px 20px;
  width: 100%;
  max-width: 280px;
  text-align: center;
  letter-spacing: 8px;
  outline: none;
  -webkit-text-security: disc;
  transition: background 0.2s;
}

.modal input:focus {
  background: rgba(255,255,255,0.12);
}

.modal input::placeholder {
  color: rgba(255,255,255,0.15);
  letter-spacing: 2px;
  font-size: 13px;
}

.modal .error {
  color: #ff453a;
  font-size: 12px;
  font-weight: 500;
  margin-top: 16px;
  height: 18px;
  letter-spacing: 2px;
}

.modal .close {
  position: absolute;
  top: 20px;
  right: 24px;
  color: rgba(255,255,255,0.3);
  font-size: 28px;
  cursor: pointer;
  background: none;
  border: none;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 22px;
}

.modal .close:active {
  background: rgba(255,255,255,0.1);
}

footer {
  position: fixed;
  bottom: 30px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
}
</style>
</head>
<body>

<div class="name">JU HAE LEE</div>
<div class="lab">Morpho Lab</div>
<button class="dash-btn" onclick="openModal()">Dashboard</button>

<div class="modal-overlay" id="modal">
  <button class="close" onclick="closeModal()">&times;</button>
  <div class="modal">
    <div class="modal-label">Enter passcode</div>
    <input type="password" id="pwd" placeholder="----" maxlength="4" inputmode="numeric" onkeydown="if(event.key==='Enter')checkPwd()">
    <div class="error" id="error"></div>
  </div>
</div>

<footer>2026</footer>

<script>
const HASH = '0ffe1abd1a08215353c233d6e009613e95eec4253832a761af28ff37ac5a150c';

function openModal() {
  document.getElementById('modal').classList.add('active');
  document.getElementById('pwd').focus();
  document.getElementById('error').textContent = '';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.getElementById('pwd').value = '';
}

async function checkPwd() {
  const pwd = document.getElementById('pwd').value;
  const encoded = new TextEncoder().encode(pwd);
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

  if (hashHex === HASH) {
    window.location.href = '/dashboard/';
  } else {
    document.getElementById('error').textContent = 'INVALID';
    document.getElementById('pwd').value = '';
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
</script>

</body>
</html>
